<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520" role="img" aria-labelledby="title desc">
  <title id="title">all to all v variable size communication</title>
  <desc id="desc">Variable-size all-to-all sends different sized shard groups from each source rank to each destination rank.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
    text { font-family: Inter, Arial, sans-serif; fill: #0f172a; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 14px; fill: #475569; }
    .step { font-size: 14px; font-weight: 700; fill: #334155; }
    .rank { font-size: 14px; font-weight: 700; }
    .part { font-size: 11px; font-weight: 700; text-anchor: middle; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .phase { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .empty { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 5 4; rx: 4; }
    .arrow { fill: none; stroke: #64748b; stroke-width: 1.5; }
    .p0 { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; rx: 4; }
    .p1 { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; rx: 4; }
    .p2 { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; rx: 4; }
  </style>
  <rect width="860" height="520" fill="#ffffff"/>

  <text x="32" y="40" class="title">Many-to-Many: all_to_allv</text>
  <text x="32" y="65" class="label">Like all_to_all, but source-to-destination shard sizes can differ.</text>

  <text x="45" y="104" class="step">Step 1: source rows use variable split sizes</text>
  <g>
    <rect x="45" y="118" width="250" height="58" class="box"/>
    <text x="62" y="151" class="rank">rank 0 source</text>
    <rect x="168" y="132" width="48" height="28" class="p0"/><text x="192" y="150" class="part">A0 A1</text>
    <rect x="220" y="132" width="34" height="28" class="p1"/><text x="237" y="150" class="part">A2</text>
    <rect x="258" y="132" width="28" height="28" class="p2"/><text x="272" y="150" class="part">A3</text>

    <rect x="310" y="118" width="250" height="58" class="box"/>
    <text x="327" y="151" class="rank">rank 1 source</text>
    <rect x="433" y="132" width="34" height="28" class="p0"/><text x="450" y="150" class="part">B0</text>
    <rect x="471" y="132" width="28" height="28" class="empty"/>
    <rect x="503" y="132" width="48" height="28" class="p2"/><text x="527" y="150" class="part">B1 B2</text>

    <rect x="575" y="118" width="250" height="58" class="box"/>
    <text x="592" y="151" class="rank">rank 2 source</text>
    <rect x="698" y="132" width="48" height="28" class="p0"/><text x="722" y="150" class="part">C0 C1</text>
    <rect x="750" y="132" width="34" height="28" class="p1"/><text x="767" y="150" class="part">C2</text>
    <rect x="788" y="132" width="28" height="28" class="p2"/><text x="802" y="150" class="part">C3</text>
  </g>

  <path d="M192 178 C250 196, 355 226, 430 263 C360 316, 245 356, 192 376" class="arrow"/>
  <path d="M237 178 C290 196, 374 226, 430 263 C448 316, 454 352, 450 376" class="arrow"/>
  <path d="M272 178 C335 196, 394 226, 430 263 C540 318, 688 358, 712 376" class="arrow"/>
  <path d="M450 178 C446 196, 436 226, 430 263 C350 318, 260 358, 237 376" class="arrow"/>
  <path d="M527 178 C510 200, 470 235, 430 263 C540 322, 722 358, 754 376" class="arrow"/>
  <path d="M722 178 C650 196, 520 226, 430 263 C342 318, 282 358, 272 376" class="arrow"/>
  <path d="M767 178 C684 200, 542 235, 430 263 C455 320, 502 354, 520 376" class="arrow"/>
  <path d="M802 178 C735 200, 580 235, 430 263 C560 324, 758 360, 796 376" class="arrow"/>
  <rect x="40" y="196" width="365" height="25" fill="#ffffff"/>
  <text x="45" y="214" class="step">Step 2: exchange uses explicit split-size metadata</text>
  <rect x="265" y="226" width="330" height="74" class="phase"/>
  <text x="430" y="250" class="label" text-anchor="middle">each pair may send a different count</text>
  <text x="430" y="270" class="label" text-anchor="middle">zero-length sends are allowed by layout</text>
  <text x="430" y="290" class="label" text-anchor="middle">destinations concatenate by source order</text>

  <rect x="40" y="332" width="360" height="25" fill="#ffffff"/>
  <text x="45" y="350" class="step">Step 3: destination rows receive variable lengths</text>
  <g>
    <rect x="45" y="364" width="250" height="58" class="box"/>
    <text x="62" y="397" class="rank">rank 0 dest</text>
    <rect x="168" y="378" width="48" height="28" class="p0"/><text x="192" y="396" class="part">A0 A1</text>
    <rect x="220" y="378" width="34" height="28" class="p0"/><text x="237" y="396" class="part">B0</text>
    <rect x="258" y="378" width="28" height="28" class="p0"/><text x="272" y="396" class="part">C0</text>

    <rect x="310" y="364" width="250" height="58" class="box"/>
    <text x="327" y="397" class="rank">rank 1 dest</text>
    <rect x="433" y="378" width="34" height="28" class="p1"/><text x="450" y="396" class="part">A2</text>
    <rect x="471" y="378" width="28" height="28" class="empty"/>
    <rect x="503" y="378" width="34" height="28" class="p1"/><text x="520" y="396" class="part">C2</text>

    <rect x="575" y="364" width="250" height="58" class="box"/>
    <text x="592" y="397" class="rank">rank 2 dest</text>
    <rect x="698" y="378" width="28" height="28" class="p2"/><text x="712" y="396" class="part">A3</text>
    <rect x="730" y="378" width="48" height="28" class="p2"/><text x="754" y="396" class="part">B1 B2</text>
    <rect x="782" y="378" width="28" height="28" class="p2"/><text x="796" y="396" class="part">C3</text>
  </g>

  <text x="430" y="463" class="label" text-anchor="middle">The payload sizes vary, so split-size metadata is part of the contract.</text>
</svg>
