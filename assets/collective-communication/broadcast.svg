<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" role="img" aria-labelledby="title desc">
  <title id="title">broadcast one-to-many communication</title>
  <desc id="desc">The root rank starts with one tensor and every rank finishes with the same tensor.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
    text { font-family: Inter, Arial, sans-serif; fill: #0f172a; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 14px; fill: #475569; }
    .step { font-size: 14px; font-weight: 700; fill: #334155; }
    .rank { font-size: 14px; font-weight: 700; }
    .part { font-size: 12px; font-weight: 700; text-anchor: middle; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .phase { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .empty { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 5 4; rx: 4; }
    .arrow { fill: none; stroke: #64748b; stroke-width: 1.7; marker-end: url(#arrow); }
    .line { fill: none; stroke: #64748b; stroke-width: 1.7; }
    .p0 { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; rx: 4; }
  </style>
  <rect width="860" height="430" fill="#ffffff"/>

  <text x="32" y="40" class="title">One-to-Many: broadcast</text>
  <text x="32" y="65" class="label">Root rank copies the same payload to every rank in the group.</text>

  <text x="45" y="104" class="step">Step 1: only the root owns the payload</text>
  <g>
    <rect x="45" y="118" width="170" height="52" class="box"/>
    <text x="60" y="149" class="rank">rank 0 root</text>
    <rect x="146" y="130" width="44" height="28" class="p0"/><text x="168" y="148" class="part">W</text>

    <rect x="245" y="118" width="170" height="52" class="box"/>
    <text x="260" y="149" class="rank">rank 1</text>
    <rect x="350" y="130" width="34" height="28" class="empty"/>

    <rect x="445" y="118" width="170" height="52" class="box"/>
    <text x="460" y="149" class="rank">rank 2</text>
    <rect x="550" y="130" width="34" height="28" class="empty"/>

    <rect x="645" y="118" width="170" height="52" class="box"/>
    <text x="660" y="149" class="rank">rank 3</text>
    <rect x="750" y="130" width="34" height="28" class="empty"/>
  </g>

  <text x="45" y="214" class="step">Step 2: one-to-many distribution</text>
  <path d="M168 172 C288 184, 392 214, 430 256" class="line"/>
  <path d="M430 256 C428 292, 410 318, 382 326 C310 336, 225 350, 168 354" class="line"/>
  <path d="M430 256 C425 294, 416 316, 402 330 C390 342, 380 350, 372 354" class="arrow"/>
  <path d="M430 256 C450 294, 494 316, 535 330 C552 342, 566 350, 572 354" class="arrow"/>
  <path d="M430 256 C465 292, 590 318, 720 338 C746 345, 764 351, 772 354" class="arrow"/>
  <rect x="335" y="224" width="190" height="64" class="phase"/>
  <text x="430" y="250" class="label" text-anchor="middle">copy root payload</text>
  <text x="430" y="270" class="label" text-anchor="middle">to every rank</text>

  <text x="45" y="316" class="step">Step 3: every rank has the same payload</text>
  <g>
    <rect x="45" y="346" width="170" height="52" class="box"/>
    <text x="60" y="377" class="rank">rank 0</text>
    <rect x="146" y="358" width="44" height="28" class="p0"/><text x="168" y="376" class="part">W</text>

    <rect x="245" y="346" width="170" height="52" class="box"/>
    <text x="260" y="377" class="rank">rank 1</text>
    <rect x="350" y="358" width="44" height="28" class="p0"/><text x="372" y="376" class="part">W</text>

    <rect x="445" y="346" width="170" height="52" class="box"/>
    <text x="460" y="377" class="rank">rank 2</text>
    <rect x="550" y="358" width="44" height="28" class="p0"/><text x="572" y="376" class="part">W</text>

    <rect x="645" y="346" width="170" height="52" class="box"/>
    <text x="660" y="377" class="rank">rank 3</text>
    <rect x="750" y="358" width="44" height="28" class="p0"/><text x="772" y="376" class="part">W</text>
  </g>
</svg>
