<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520" role="img" aria-labelledby="title desc">
  <title id="title">all to all many-to-many communication</title>
  <desc id="desc">Each rank starts with destination-specific shards, sends each shard to its destination rank, and receives shards from all source ranks.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
    text { font-family: Inter, Arial, sans-serif; fill: #0f172a; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 14px; fill: #475569; }
    .step { font-size: 14px; font-weight: 700; fill: #334155; }
    .rank { font-size: 14px; font-weight: 700; }
    .part { font-size: 11px; font-weight: 700; text-anchor: middle; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .phase { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .arrow { fill: none; stroke: #64748b; stroke-width: 1.6; }
    .line { fill: none; stroke: #64748b; stroke-width: 1.6; }
    .p0 { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; rx: 4; }
    .p1 { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; rx: 4; }
    .p2 { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; rx: 4; }
  </style>
  <rect width="860" height="520" fill="#ffffff"/>

  <text x="32" y="40" class="title">Many-to-Many: all_to_all</text>
  <text x="32" y="65" class="label">Each source rank sends one destination-specific shard to every destination rank.</text>

  <text x="45" y="104" class="step">Step 1: source rows contain shards by destination rank</text>
  <g>
    <rect x="45" y="118" width="240" height="58" class="box"/>
    <text x="62" y="151" class="rank">rank 0 source</text>
    <rect x="162" y="132" width="34" height="28" class="p0"/><text x="179" y="150" class="part">A0</text>
    <rect x="200" y="132" width="34" height="28" class="p1"/><text x="217" y="150" class="part">A1</text>
    <rect x="238" y="132" width="34" height="28" class="p2"/><text x="255" y="150" class="part">A2</text>

    <rect x="320" y="118" width="240" height="58" class="box"/>
    <text x="337" y="151" class="rank">rank 1 source</text>
    <rect x="437" y="132" width="34" height="28" class="p0"/><text x="454" y="150" class="part">B0</text>
    <rect x="475" y="132" width="34" height="28" class="p1"/><text x="492" y="150" class="part">B1</text>
    <rect x="513" y="132" width="34" height="28" class="p2"/><text x="530" y="150" class="part">B2</text>

    <rect x="595" y="118" width="240" height="58" class="box"/>
    <text x="612" y="151" class="rank">rank 2 source</text>
    <rect x="712" y="132" width="34" height="28" class="p0"/><text x="729" y="150" class="part">C0</text>
    <rect x="750" y="132" width="34" height="28" class="p1"/><text x="767" y="150" class="part">C1</text>
    <rect x="788" y="132" width="34" height="28" class="p2"/><text x="805" y="150" class="part">C2</text>
  </g>

  <path d="M179 178 C250 196, 355 226, 430 263 C360 316, 235 356, 179 376" class="arrow"/>
  <path d="M217 178 C280 196, 372 226, 430 263 C450 314, 458 352, 454 376" class="arrow"/>
  <path d="M255 178 C325 196, 390 226, 430 263 C540 316, 690 356, 729 376" class="arrow"/>
  <path d="M454 178 C450 196, 438 226, 430 263 C350 316, 250 356, 217 376" class="arrow"/>
  <path d="M492 178 C482 200, 452 235, 430 263 C458 320, 488 352, 492 376" class="arrow"/>
  <path d="M530 178 C510 200, 470 235, 430 263 C540 322, 720 358, 767 376" class="arrow"/>
  <path d="M729 178 C650 196, 520 226, 430 263 C340 318, 270 356, 255 376" class="arrow"/>
  <path d="M767 178 C680 200, 540 235, 430 263 C455 320, 510 354, 530 376" class="arrow"/>
  <path d="M805 178 C735 200, 580 235, 430 263 C560 324, 752 360, 805 376" class="arrow"/>
  <rect x="40" y="196" width="390" height="25" fill="#ffffff"/>
  <text x="45" y="214" class="step">Step 2: many-to-many reshuffle by destination index</text>
  <rect x="270" y="226" width="320" height="74" class="phase"/>
  <text x="430" y="250" class="label" text-anchor="middle">suffix 0 goes to rank 0</text>
  <text x="430" y="270" class="label" text-anchor="middle">suffix 1 goes to rank 1</text>
  <text x="430" y="290" class="label" text-anchor="middle">suffix 2 goes to rank 2</text>

  <rect x="40" y="332" width="388" height="25" fill="#ffffff"/>
  <text x="45" y="350" class="step">Step 3: destination rows contain shards from all sources</text>
  <g>
    <rect x="45" y="364" width="240" height="58" class="box"/>
    <text x="62" y="397" class="rank">rank 0 dest</text>
    <rect x="162" y="378" width="34" height="28" class="p0"/><text x="179" y="396" class="part">A0</text>
    <rect x="200" y="378" width="34" height="28" class="p0"/><text x="217" y="396" class="part">B0</text>
    <rect x="238" y="378" width="34" height="28" class="p0"/><text x="255" y="396" class="part">C0</text>

    <rect x="320" y="364" width="240" height="58" class="box"/>
    <text x="337" y="397" class="rank">rank 1 dest</text>
    <rect x="437" y="378" width="34" height="28" class="p1"/><text x="454" y="396" class="part">A1</text>
    <rect x="475" y="378" width="34" height="28" class="p1"/><text x="492" y="396" class="part">B1</text>
    <rect x="513" y="378" width="34" height="28" class="p1"/><text x="530" y="396" class="part">C1</text>

    <rect x="595" y="364" width="240" height="58" class="box"/>
    <text x="612" y="397" class="rank">rank 2 dest</text>
    <rect x="712" y="378" width="34" height="28" class="p2"/><text x="729" y="396" class="part">A2</text>
    <rect x="750" y="378" width="34" height="28" class="p2"/><text x="767" y="396" class="part">B2</text>
    <rect x="788" y="378" width="34" height="28" class="p2"/><text x="805" y="396" class="part">C2</text>
  </g>

  <text x="430" y="463" class="label" text-anchor="middle">No reduction is performed; the operation is a distributed layout transpose.</text>
</svg>
